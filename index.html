<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Huddle | Build the community your fans will love</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#"
          ><img
            class="brand__logo"
            src="assets/images/logo.svg"
            alt="Huddle logo"
        /></a>
      </header>

      <main id="main-content">
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero__media">
            <img
              src="assets/images/illustration-mockups.svg"
              alt="Illustration of a community dashboard interface"
            />
          </div>

          <div class="hero__content">
            <h1 id="hero-title">
              Build The Community<br />
              Your Fans Will Love
            </h1>
            <p>
              Huddle re-imagines the way we build communities. You have a voice,
              but so does your audience. Create connections with your users as
              you engage in genuine discussion.
            </p>
            <a class="button button--primary" href="#">Register</a>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <nav class="social-links" aria-label="Social media links">
          <a class="social-link" href="#" aria-label="Visit Huddle on Facebook">
            <img src="assets/images/social media icon/facebook.svg" alt="" />
          </a>
          <a class="social-link" href="#" aria-label="Visit Huddle on Twitter">
            <img src="assets/images/social media icon/twitter.svg" alt="" />
          </a>
          <a
            class="social-link"
            href="#"
            aria-label="Visit Huddle on Instagram"
          >
            <img src="assets/images/social media icon/instagram.svg" alt="" />
          </a>
        </nav>
      </footer>
    </div>
  </body>
</html>
